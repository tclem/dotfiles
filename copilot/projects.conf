# Copilot Agent Project Configuration
#
# Each [section] is a project name (used as tmux session name).
#   repos — space-separated list of owner/repo:base (base defaults to main)
#   local — if true, use repos as-is without creating worktrees
#
# Example:
#   [myproject]
#   repos=github/repo-a:dev github/repo-b

[blackbird]
repos=github/blackbird:dev

[dotfiles]
repos=tclem/dotfiles
local=true

[treelights]
repos=github/treelights

[gh-inbox-zero]
repos=github/gh-inbox-zero
local=true
